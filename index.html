<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOTAM Visualizer — VOMM / VOMF Chennai</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: #0a0f1a;
    color: #c8d8f0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    background: #0d1526;
    border-bottom: 1px solid #1e3a5f;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #header h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    color: #4db8ff;
    letter-spacing: 2px;
  }
  #header .sub {
    font-size: 11px;
    color: #5a7fa8;
    font-family: 'Share Tech Mono', monospace;
  }

  .icao-tabs { display: flex; gap: 6px; }
  .icao-tab {
    padding: 4px 12px;
    border: 1px solid #1e3a5f;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    cursor: pointer;
    background: transparent;
    color: #5a7fa8;
    transition: all .2s;
  }
  .icao-tab.active { background: #1e3a5f; color: #4db8ff; border-color: #4db8ff; }
  .icao-tab:hover { border-color: #4db8ff; color: #4db8ff; }

  #fetch-btn {
    padding: 6px 16px;
    background: #163a6b;
    border: 1px solid #4db8ff;
    border-radius: 4px;
    color: #4db8ff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    margin-left: auto;
  }
  #fetch-btn:hover { background: #1e4d8c; }
  #fetch-btn:disabled { opacity: .4; cursor: not-allowed; }

  #utc-clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #3a6a9a;
  }

  /* ── BODY ── */
  #body { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 340px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1e3a5f;
    overflow: hidden;
    background: #0a0f1a;
  }

  #stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 6px;
    padding: 10px;
    border-bottom: 1px solid #1e3a5f;
    flex-shrink: 0;
  }
  .stat-card {
    background: #0d1526;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    padding: 8px 4px;
    text-align: center;
  }
  .stat-card .num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: #4db8ff;
  }
  .stat-card .num.active-num { color: #3df57a; }
  .stat-card .num.upcoming-num { color: #f5d63d; }
  .stat-card .num.expired-num { color: #5a5a6a; }
  .stat-card .lbl {
    font-size: 10px;
    color: #5a7fa8;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  #filters {
    padding: 8px 10px;
    border-bottom: 1px solid #1e3a5f;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    flex-shrink: 0;
    align-items: center;
  }
  .filter-label {
    font-size: 10px;
    color: #3a5a7a;
    font-family: 'Share Tech Mono', monospace;
  }
  .filter-chip {
    padding: 3px 9px;
    border: 1px solid;
    border-radius: 20px;
    font-size: 10px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Share Tech Mono', monospace;
    opacity: 0.5;
  }
  .filter-chip.on { opacity: 1; }

  #notam-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  #notam-list::-webkit-scrollbar { width: 4px; }
  #notam-list::-webkit-scrollbar-track { background: #0a0f1a; }
  #notam-list::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

  .notam-card {
    background: #0d1526;
    border: 1px solid #1e3a5f;
    border-left: 3px solid transparent;
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 7px;
    cursor: pointer;
    transition: all .15s;
  }
  .notam-card:hover { background: #111e35; border-color: #2a5080; }
  .notam-card.selected { background: #111e35; border-top-color: #2a5080; border-right-color: #2a5080; border-bottom-color: #2a5080; }

  .notam-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .notam-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #4db8ff;
    font-weight: 600;
  }

  .badge {
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 9px;
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
    letter-spacing: .5px;
    border: 1px solid;
  }
  .badge-airspace  { background: #1a3a6e; color: #5b9af5; border-color: #2a5080; }
  .badge-nav       { background: #1a3a2e; color: #5bf58a; border-color: #1e5040; }
  .badge-aerodrome { background: #3a2a1a; color: #f5b85b; border-color: #5a4020; }
  .badge-obstacle  { background: #3a1a1a; color: #f55b5b; border-color: #5a2020; }
  .badge-other     { background: #2a1a3a; color: #c85bf5; border-color: #4a2060; }
  .badge-active    { background: #0d2a1a; color: #3df57a; border-color: #1a5a30; }
  .badge-upcoming  { background: #2a2a0d; color: #f5d63d; border-color: #5a5010; }
  .badge-expired   { background: #1a1a1a; color: #5a5a6a; border-color: #2a2a2a; }

  .notam-text {
    font-size: 11px;
    color: #7a9cbd;
    line-height: 1.5;
    max-height: 54px;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    word-break: break-all;
  }
  .notam-time {
    font-size: 10px;
    color: #3a5a7a;
    margin-top: 6px;
    font-family: 'Share Tech Mono', monospace;
  }
  .icao-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
    background: #163050;
    color: #4db8ff;
    margin-left: auto;
  }

  /* ── MAP ── */
  #map { flex: 1; background: #0a1020; }
  .leaflet-container { background: #0a1020 !important; }

  /* ── DETAIL PANEL ── */
  #detail-panel {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 300px;
    background: #0d1526ee;
    border: 1px solid #2a5080;
    border-radius: 8px;
    padding: 14px;
    display: none;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }
  #detail-panel.visible { display: block; }
  #detail-close {
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    color: #5a7fa8;
    font-size: 18px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    line-height: 1;
  }
  #detail-close:hover { color: #4db8ff; }
  #detail-id { font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #4db8ff; margin-bottom: 8px; }
  #detail-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #8aabcc;
    line-height: 1.6;
    max-height: 200px;
    overflow-y: auto;
    word-break: break-all;
    margin-bottom: 8px;
  }
  #detail-meta { font-size: 10px; color: #3a5a7a; font-family: 'Share Tech Mono', monospace; line-height: 1.8; }

  /* ── STATUS BAR ── */
  #status-bar {
    padding: 4px 12px;
    background: #060c18;
    border-top: 1px solid #1e3a5f;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #3a5a7a;
    flex-shrink: 0;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  #status-msg { flex: 1; }
  #loading-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #3df57a;
    display: none;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #3a5a7a;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    line-height: 2.2;
  }

  /* leaflet tooltip */
  .leaflet-tooltip {
    background: #0d1526 !important;
    border: 1px solid #2a5080 !important;
    color: #8aabcc !important;
    font-family: 'Share Tech Mono', monospace !important;
    font-size: 11px !important;
    border-radius: 4px !important;
    box-shadow: none !important;
  }
  .leaflet-tooltip-top:before { border-top-color: #2a5080 !important; }
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>NOTAM VISUALIZER</h1>
    <div class="sub">FAA DINS — Chennai TMA</div>
  </div>
  <div class="icao-tabs">
    <button class="icao-tab active" data-icao="VOMM" onclick="toggleIcao(this)">VOMM</button>
    <button class="icao-tab active" data-icao="VOMF" onclick="toggleIcao(this)">VOMF</button>
    <button class="icao-tab" data-icao="VECF" onclick="toggleIcao(this)">VECF</button>
    <button class="icao-tab" data-icao="VOCB" onclick="toggleIcao(this)">VOCB</button>
    <button class="icao-tab" data-icao="VOBL" onclick="toggleIcao(this)">VOBL</button>
  </div>
  <div id="utc-clock">UTC: --:--:--</div>
  <button id="fetch-btn" onclick="fetchAll()">⟳ FETCH NOTAMs</button>
</div>

<div id="body">
  <div id="sidebar">
    <div id="stats">
      <div class="stat-card"><div class="num" id="s-total">—</div><div class="lbl">Total</div></div>
      <div class="stat-card"><div class="num active-num" id="s-active">—</div><div class="lbl">Active</div></div>
      <div class="stat-card"><div class="num upcoming-num" id="s-upcoming">—</div><div class="lbl">Soon</div></div>
      <div class="stat-card"><div class="num expired-num" id="s-expired">—</div><div class="lbl">Expired</div></div>
    </div>
    <div id="filters">
      <span class="filter-label">FILTER:</span>
      <span class="filter-chip on" data-type="airspace" style="border-color:#5b9af5;color:#5b9af5" onclick="toggleFilter(this)">AIRSPACE</span>
      <span class="filter-chip on" data-type="nav"      style="border-color:#5bf58a;color:#5bf58a" onclick="toggleFilter(this)">NAV</span>
      <span class="filter-chip on" data-type="aerodrome" style="border-color:#f5b85b;color:#f5b85b" onclick="toggleFilter(this)">AERODROME</span>
      <span class="filter-chip on" data-type="obstacle" style="border-color:#f55b5b;color:#f55b5b" onclick="toggleFilter(this)">OBSTACLE</span>
      <span class="filter-chip on" data-type="other"   style="border-color:#c85bf5;color:#c85bf5" onclick="toggleFilter(this)">OTHER</span>
    </div>
    <div id="notam-list">
      <div class="empty-state">
        ▸ Click <strong>FETCH NOTAMs</strong><br>
        to load today's data<br>
        for VOMM · VOMF<br>
        <br>
        Toggle VECF / VOCB / VOBL<br>
        for nearby airports
      </div>
    </div>
  </div>

  <div style="flex:1;position:relative;">
    <div id="map"></div>
    <div id="detail-panel">
      <button id="detail-close" onclick="closeDetail()">✕</button>
      <div id="detail-id"></div>
      <div id="detail-text"></div>
      <div id="detail-meta"></div>
    </div>
  </div>
</div>

<div id="status-bar">
  <div id="loading-dot"></div>
  <div id="status-msg">READY — Click FETCH NOTAMs to begin</div>
  <div id="utc-status"></div>
</div>

<script>
// ── STATE ──
const AIRPORTS = {
  VOMM: { lat: 12.9941, lon: 80.1709, name: 'Chennai Intl' },
  VOMF: { lat: 12.9941, lon: 80.1709, name: 'Chennai Approach' },
  VECF: { lat: 20.2444, lon: 85.8178, name: 'Bhubaneswar FIR' },
  VOCB: { lat: 11.0296, lon: 77.0434, name: 'Coimbatore' },
  VOBL: { lat: 13.1986, lon: 77.7066, name: 'Bengaluru' },
};

let map, allNotams = [], mapMarkers = [], mapCircles = [];
let selectedIcaos = new Set(['VOMM', 'VOMF']);
let activeFilters = new Set(['airspace','nav','aerodrome','obstacle','other']);
let selectedIdx = null;

// ── UTC CLOCK ──
function updateClock() {
  const now = new Date();
  const hh = String(now.getUTCHours()).padStart(2,'0');
  const mm = String(now.getUTCMinutes()).padStart(2,'0');
  const ss = String(now.getUTCSeconds()).padStart(2,'0');
  document.getElementById('utc-clock').textContent = `UTC: ${hh}:${mm}:${ss}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── MAP INIT ──
function initMap() {
  map = L.map('map', {
    center: [12.9941, 80.17],
    zoom: 8,
    attributionControl: true,
    zoomControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    maxZoom: 16, subdomains: 'abcd'
  }).addTo(map);

  // Airport anchor markers
  Object.entries(AIRPORTS).forEach(([icao, ap]) => {
    const icon = L.divIcon({
      html: `<div style="width:10px;height:10px;background:#4db8ff;border-radius:50%;border:2px solid #0a0f1a;box-shadow:0 0 8px #4db8ff55"></div>`,
      iconSize: [10,10], iconAnchor: [5,5], className: ''
    });
    L.marker([ap.lat, ap.lon], { icon })
      .addTo(map)
      .bindTooltip(`${icao} — ${ap.name}`, { permanent: false, className: 'leaflet-tooltip' });
  });

  // TMA range rings around VOMM
  [50, 100, 200].forEach(nm => {
    L.circle([12.9941, 80.1709], {
      radius: nm * 1852,
      color: '#1e3a5f', weight: 0.8, fill: false,
      dashArray: nm === 50 ? '4 4' : '2 8',
      opacity: 0.5
    }).addTo(map);
    L.marker([12.9941 + nm * 1852 / 111320, 80.1709], {
      icon: L.divIcon({
        html: `<span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#2a5a8a">${nm}NM</span>`,
        iconSize: [36,12], iconAnchor: [18,6], className: ''
      })
    }).addTo(map);
  });
}

// ── NOTAM CLASSIFICATION ──
function classifyNotam(text) {
  const t = text.toUpperCase();
  if (/\b(RESTRICTED|PROHIB|TRA|TSA|CTA|TFR|DANGER|P AREA|D AREA|R AREA|AIRSPACE|CLASS|SFC|FL\d|AGL)\b/.test(t)) return 'airspace';
  if (/\b(ILS|VOR|NDB|DME|TACAN|LOC|GLIDE|GP|ATC|RADAR|ADS-B|NAVAID|PSR|SSR|FREQ)\b/.test(t)) return 'nav';
  if (/\b(RWY|RUNWAY|TWY|TAXIWAY|APRON|PAPI|VASI|ALS|LIGHTING|STAND|ARRESTING|PCN|TORA|LDA|THRESHOLD)\b/.test(t)) return 'aerodrome';
  if (/\b(OBSTACLE|OBS|CRANE|TOWER|MAST|TURBINE|CHIMNEY|STRUCTURE|ELEV|AGL)\b/.test(t)) return 'obstacle';
  return 'other';
}

function getStatus(startStr, endStr) {
  const now = Date.now();
  try {
    const start = startStr ? new Date(startStr).getTime() : 0;
    const end   = endStr   ? new Date(endStr).getTime()   : Infinity;
    if (now < start) return 'upcoming';
    if (now > end)   return 'expired';
    return 'active';
  } catch(e) { return 'active'; }
}

function typeColor(type) {
  return { airspace:'#5b9af5', nav:'#5bf58a', aerodrome:'#f5b85b', obstacle:'#f55b5b', other:'#c85bf5' }[type] || '#4db8ff';
}

// ── PARSE RADIUS FROM NOTAM TEXT ──
function parseRadius(text) {
  const m = text.match(/(?:WITHIN|RADIUS)\s+(\d+(?:\.\d+)?)\s*(NM|KM|M)?/i) ||
            text.match(/(\d+(?:\.\d+)?)\s*NM\s+RADIUS/i);
  if (!m) return null;
  let r = parseFloat(m[1]);
  const unit = (m[2] || 'NM').toUpperCase();
  if (unit === 'KM') r *= 1000;
  else if (unit === 'NM') r *= 1852;
  return r < 500000 ? r : null;
}

// ── FETCH NOTAMS ──
async function fetchAll() {
  const btn = document.getElementById('fetch-btn');
  btn.disabled = true;
  btn.textContent = '⟳ FETCHING...';
  document.getElementById('loading-dot').style.display = 'block';
  allNotams = [];

  for (const icao of selectedIcaos) {
    setStatus(`Fetching NOTAMs for ${icao}...`);
    try {
      // Use Vercel proxy — /api/notams maps to FAA's API
      const url = `/api/notams?icaoLocation=${icao}&responseFormat=geoJson&pageSize=100&pageNum=1`;
      const res = await fetch(url, {
        headers: {
          'client_id': 'notam_public',
          'client_secret': 'notam_public'
        }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      const features = data.features || data.items || (Array.isArray(data) ? data : []);
      features.forEach(f => {
        // Normalise nested structure from FAA GeoJSON
        const props = f.properties || {};
        const core  = props.coreNOTAMData?.notam || {};
        const text  = props.notamText || core.bobMessage || core.icaoMessage || core.traditionalMessage || '';
        const id    = props.notamNumber || core.number || core.notamNumber || f.id || ('N' + Math.random().toString(36).substr(2,6).toUpperCase());
        const start = props.startDate || core.effectiveStart || core.startDate || '';
        const end   = props.endDate   || core.effectiveEnd   || core.endDate   || '';

        // Try to get coordinates from GeoJSON geometry
        let lat = null, lon = null;
        if (f.geometry?.coordinates) {
          const c = f.geometry.coordinates;
          if (Array.isArray(c) && c.length === 2 && typeof c[0] === 'number') {
            lon = c[0]; lat = c[1];
          }
        }
        if (!lat) {
          lat = AIRPORTS[icao]?.lat || 12.9941;
          lon = AIRPORTS[icao]?.lon || 80.1709;
        }

        allNotams.push({ _icao: icao, _id: id, _text: text, _start: start, _end: end,
          _type: classifyNotam(text), _status: getStatus(start, end), _lat: lat, _lon: lon });
      });

      setStatus(`Loaded ${features.length} NOTAMs for ${icao}`);
    } catch(e) {
      console.warn(`${icao} fetch error:`, e);
      // Fallback to demo data if API unreachable
      getDemoNotams(icao).forEach(n => allNotams.push(n));
      setStatus(`Demo data loaded for ${icao} (API proxy not available in this environment)`);
    }
  }

  updateStats();
  renderList();
  renderMap();

  btn.disabled = false;
  btn.textContent = '⟳ FETCH NOTAMs';
  document.getElementById('loading-dot').style.display = 'none';
  setStatus(`${allNotams.length} NOTAMs loaded — ${new Date().toUTCString()}`);
}

// ── DEMO DATA (fallback) ──
function getDemoNotams(icao) {
  const now = new Date();
  const m2h  = t => new Date(t.getTime() - 7200000).toISOString();
  const p6h  = t => new Date(t.getTime() + 21600000).toISOString();
  const p1h  = t => new Date(t.getTime() + 3600000).toISOString();
  const m10h = t => new Date(t.getTime() - 36000000).toISOString();
  const m8h  = t => new Date(t.getTime() - 28800000).toISOString();

  const demos = {
    VOMM: [
      { id:'A0301/26', type:'airspace', status:'active',   start:m2h(now), end:p6h(now), lat:12.99, lon:80.17, text:'RESTRICTED AREA ACTIVATED WI RADIUS 30NM 125930N 0800942E SFC-FL200 DUE MILITARY EXERCISE. NO CIVIL ACFT CLNC WI AREA WITHOUT PRIOR CRDNTN.' },
      { id:'A0302/26', type:'nav',      status:'active',   start:m2h(now), end:p6h(now), lat:12.994,lon:80.158,text:'VOMM ILS RWY 07 LOCALIZER U/S FOR MAINTENANCE. ILS CAT I APPROACH NOT AVAILABLE RWY 07. NDB (L) VOM 385 KHZ OPERATIONAL.' },
      { id:'A0303/26', type:'aerodrome',status:'active',   start:m2h(now), end:p6h(now), lat:12.990,lon:80.165,text:'VOMM TAXIWAY B CLSD BTN TWY A AND TWY C FOR PAVEMENT REPAIRS. ACFT CODE E AND ABOVE USE ALT ROUTING VIA TWY D AND E.' },
      { id:'A0304/26', type:'obstacle', status:'active',   start:m2h(now), end:p6h(now), lat:13.030,lon:80.15, text:'NEW OBSTACLE CONSTRUCTION CRANE ERECTED 1302N 08009E ELEV 387FT AMSL AGL 210FT. RED OBSTRUCTION LIGHTS INSTALLED.' },
      { id:'A0305/26', type:'airspace', status:'upcoming', start:p1h(now), end:p6h(now), lat:12.80, lon:80.25, text:'TRAINING AREA ACTIVATED WI 50NM RADIUS 1259N 08011E FL050-FL150 0600Z TO 1200Z DAILY FOR FIGHTER TRAINING.' },
      { id:'A0306/26', type:'nav',      status:'upcoming', start:p1h(now), end:p6h(now), lat:12.994,lon:80.171,text:'VOMM VOR/DME VOC 115.1 MHZ U/S FOR ROUTINE MAINTENANCE. EXPECT RTN NORMAL OPS 0600Z ADVISE ATC BEFORE DEPRTR.' },

  return (demos[icao] || []).map(d => ({
    _icao: icao, _id: d.id, _text: d.text, _type: d.type, _status: d.status,
    _start: d.start, _end: d.end, _lat: d.lat, _lon: d.lon
  }));
}

// ── FILTERED VIEW ──
function getFiltered() {
  return allNotams.filter(n => activeFilters.has(n._type));
}

// ── UPDATE STATS ──
function updateStats() {
  document.getElementById('s-total').textContent    = allNotams.length;
  document.getElementById('s-active').textContent   = allNotams.filter(n => n._status === 'active').length;
  document.getElementById('s-upcoming').textContent = allNotams.filter(n => n._status === 'upcoming').length;
  document.getElementById('s-expired').textContent  = allNotams.filter(n => n._status === 'expired').length;
}

// ── RENDER LIST ──
function renderList() {
  const list = document.getElementById('notam-list');
  const filtered = getFiltered();
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state">No NOTAMs match current filter</div>';
    return;
  }

  // Sort: active first, then upcoming, then expired
  const order = { active:0, upcoming:1, expired:2 };
  filtered.sort((a,b) => order[a._status] - order[b._status]);

  list.innerHTML = filtered.map((n, i) => {
    const color = typeColor(n._type);
    const short = n._text.replace(/\s+/g,' ').substring(0,110) + (n._text.length > 110 ? '…' : '');
    const startFmt = n._start ? new Date(n._start).toUTCString().substring(4,25) : '—';
    const endFmt   = n._end   ? new Date(n._end).toUTCString().substring(4,25)   : 'PERM';
    return `<div class="notam-card" id="nc-${i}" onclick="selectNotam(${i})" style="border-left-color:${color}">
      <div class="notam-header">
        <span class="notam-id">${n._id}</span>
        <span class="badge badge-${n._type}">${n._type}</span>
        <span class="badge badge-${n._status}">${n._status}</span>
        <span class="icao-badge">${n._icao}</span>
      </div>
      <div class="notam-text">${short}</div>
      <div class="notam-time">FROM: ${startFmt} | TO: ${endFmt}</div>
    </div>`;
  }).join('');
}

// ── RENDER MAP OVERLAYS ──
function renderMap() {
  mapMarkers.forEach(m => map.removeLayer(m));
  mapCircles.forEach(c => map.removeLayer(c));
  mapMarkers = []; mapCircles = [];

  const filtered = getFiltered();
  const sorted = [...filtered].sort((a,b) => {const o={active:0,upcoming:1,expired:2}; return o[a._status]-o[b._status];});

  sorted.forEach((n, i) => {
    const color = typeColor(n._type);
    const opacity = n._status === 'expired' ? 0.3 : n._status === 'upcoming' ? 0.65 : 1;

    // Jitter same-airport NOTAMs slightly so they don't overlap exactly
    const jitter = [
      (Math.sin(i * 7.3) * 0.04),
      (Math.cos(i * 5.1) * 0.04)
    ];
    const pos = [n._lat + jitter[0], n._lon + jitter[1]];

    // Circle overlay for area NOTAMs
    const radius = parseRadius(n._text);
    if (radius) {
      const circle = L.circle(pos, {
        radius, color, weight: 1.5,
        fillColor: color, fillOpacity: 0.07 * opacity,
        opacity: opacity * 0.7, dashArray: n._status === 'upcoming' ? '5 5' : null
      }).addTo(map);
      circle.on('click', () => selectNotam(i));
      mapCircles.push(circle);
    }

    // Dot marker
    const icon = L.divIcon({
      html: `<div style="width:10px;height:10px;background:${color};border-radius:50%;border:2px solid #0a0f1a;opacity:${opacity};box-shadow:0 0 8px ${color}88"></div>`,
      iconSize: [10,10], iconAnchor: [5,5], className: ''
    });
    const mk = L.marker(pos, { icon }).addTo(map);
    mk.bindTooltip(`<b>${n._id}</b> [${n._icao}]<br>${n._type.toUpperCase()} · ${n._status.toUpperCase()}`, {});
    mk.on('click', () => selectNotam(i));
    mapMarkers.push(mk);
  });
}

// ── SELECT NOTAM ──
function selectNotam(idx) {
  // Unhighlight previous
  document.querySelectorAll('.notam-card.selected').forEach(c => c.classList.remove('selected'));

  const filtered = getFiltered();
  const sorted = [...filtered].sort((a,b) => {const o={active:0,upcoming:1,expired:2}; return o[a._status]-o[b._status];});
  const n = sorted[idx];
  if (!n) return;

  // Highlight card
  const card = document.getElementById(`nc-${idx}`);
  if (card) { card.classList.add('selected'); card.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

  // Pan map
  if (mapMarkers[idx]) {
    map.panTo(mapMarkers[idx].getLatLng(), { animate: true, duration: 0.5 });
    mapMarkers[idx].openTooltip();
  }

  // Show detail panel
  const startFmt = n._start ? new Date(n._start).toUTCString() : '—';
  const endFmt   = n._end   ? new Date(n._end).toUTCString()   : 'PERMANENT';
  document.getElementById('detail-id').textContent   = `${n._id}  [${n._icao}]`;
  document.getElementById('detail-text').textContent = n._text || 'No text available';
  document.getElementById('detail-meta').innerHTML   =
    `TYPE: ${n._type.toUpperCase()}<br>STATUS: ${n._status.toUpperCase()}<br>FROM: ${startFmt}<br>TO: ${endFmt}`;
  document.getElementById('detail-panel').classList.add('visible');

  selectedIdx = idx;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
  document.querySelectorAll('.notam-card.selected').forEach(c => c.classList.remove('selected'));
}

// ── TOGGLE ICAO ──
function toggleIcao(btn) {
  const icao = btn.dataset.icao;
  if (selectedIcaos.has(icao) && selectedIcaos.size > 1) {
    selectedIcaos.delete(icao);
    btn.classList.remove('active');
  } else {
    selectedIcaos.add(icao);
    btn.classList.add('active');
  }
}

// ── TOGGLE FILTER ──
function toggleFilter(chip) {
  const type = chip.dataset.type;
  if (activeFilters.has(type)) {
    activeFilters.delete(type);
    chip.classList.remove('on');
  } else {
    activeFilters.add(type);
    chip.classList.add('on');
  }
  if (allNotams.length) { renderList(); renderMap(); }
}

// ── STATUS ──
function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

// ── INIT ──
window.addEventListener('load', () => {
  initMap();
  setStatus('READY — Click FETCH NOTAMs to load today\'s data');
});
</script>
